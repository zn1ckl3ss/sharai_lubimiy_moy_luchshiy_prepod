name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 1. Проверка безопасности (SAST) с помощью bandit
    - name: Run Security Scan (Bandit)
      run: bandit -r app/

    # 2. Проверка стиля кода с помощью ruff
    - name: Run Ruff Linter
      run: ruff check app/

    # 3. Проверка форматирования с помощью ruff
    - name: Run Ruff Formatter Check
      run: ruff format --check app/

    # 4. Дополнительная проверка старого линтера pylint (если требует ТЗ)
    - name: Run Pylint
      run: pylint --disable=C0114,C0115,C0116 app/   # отключаем придирки к докстрингам для простоты

    # 5. Запуск тестов через pytest
    - name: Run Tests with Pytest
      run: PYTHONPATH=. pytest

    # 6. Настройка Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.5.7

    # 7. Инициализация Terraform
    - name: Terraform Init
      run: terraform init
      working-directory: ./terraform

    # 8. Запуск Terraform с передачей секретного ключа
    - name: Terraform Apply
      run: terraform apply -auto-approve
      working-directory: ./terraform
      env:
        TF_VAR_ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}

    # 9. Настройка SSH-ключа для Ansible
    - name: Setup SSH Key for Ansible
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        # Добавляем сервер в Known Hosts, чтобы GitHub не ругался на незнакомый IP
        ssh-keyscan -H 91.205.220.142 >> ~/.ssh/known_hosts

    # 10. Установка Ansible в окружение GitHub
    - name: Install Ansible
      run: |
        sudo apt-get update
        sudo apt-get install -y ansible

    # 11. Запуск деплоя через Ansible Playbook
    - name: Run Ansible Playbook
      run: ansible-playbook -i ansible/hosts.ini ansible/playbook.yml